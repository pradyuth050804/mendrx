spring.application.name=mendrx
spring.servlet.multipart.max-file-size=28MB
spring.servlet.multipart.max-request-size=30MB

spring.jpa.hibernate.ddl-auto=validate

# Actuator endpoints for health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

cors.allowed-origins=http://localhost:3000

google.cloud.vertex-ai-project-id=mendrx
google.cloud.vertex-ai.location=global
google.cloud.vertex-ai.global-endpoint=aiplatform.googleapis.com

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=15000
spring.datasource.hikari.leak-detection-threshold=4000
spring.datasource.hikari.auto-commit=true

spring.datasource.hikari.data-source-properties.cachePrepStmts=false
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=0
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=0

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

slack.webhook.mendrx-leads.url=${SLACK_LEADS_WEBHOOK_URL:https://hooks.slack.com/services/CHANGE_ME}
slack.webhook.mendrx-error-notifications.url=${SLACK_ERROR_WEBHOOK_URL:https://hooks.slack.com/services/CHANGE_ME}
